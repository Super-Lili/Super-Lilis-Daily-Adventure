name: 🌸 Super-Lili Weekly Evolution

on:
  schedule:
    - cron: '5 0 * * 0'   # 08:05 Beijing Sunday (primary)
    - cron: '5 6 * * 0'   # 14:05 Beijing Sunday (backup)
    - cron: '5 12 * * 0'  # 20:05 Beijing Sunday (backup)
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check
        id: check
        run: |
          WEEK=$(TZ='Asia/Shanghai' date +'%Y-W%V')
          if git log --oneline --since="7 days ago" | grep -q "Weekly Evolution"; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Run
        if: steps.check.outputs.skip == 'false'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python super_lili_weekly_evolution.py

      - name: Commit
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "Super-Lili (Evolution)"
          git config user.email "lili-bot@users.noreply.github.com"
          git pull --rebase origin main
          git add .
          git diff --cached --quiet || git commit -m "🌸 $(TZ='Asia/Shanghai' date +'%Y-%m-%d') Weekly Evolution"
          git push
