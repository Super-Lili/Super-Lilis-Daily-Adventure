name: 🌸 Super-Lili Weekly Evolution

on:
  schedule:
    # Every Sunday at 22:00 Beijing Time = 14:00 UTC
    # Runs after the daily job (21:15 BJ) so today's diary is included
    - cron: '0 14 * * 0'
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai requests

      - name: 🌸 Run Weekly Evolution
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "=== Super-Lili Weekly Evolution: $(date -u) ==="
          python super_lili_weekly_evolution.py

      - name: 📝 Commit Evolution Results
        run: |
          git config --global user.name "Super-Lili (Evolution)"
          git config --global user.email "lili-bot@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "🌸 Weekly Evolution: $(date -u +'%Y-%m-%d') | Soul Upgraded"
          git push
