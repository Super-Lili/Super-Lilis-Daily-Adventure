name: 💬 Super-Lili Responds to Issues

on:
  issues:
    types: [opened]        # Fires immediately when a new issue is opened
  schedule:
    # Also scan daily at 21:30 BJ = 13:30 UTC to catch any missed issues
    # 08:15 Beijing Time = 00:15 UTC (runs after daily diary)
    - cron: '15 0 * * *'
  workflow_dispatch:

jobs:
  respond:
    runs-on: ubuntu-latest
    permissions:
      issues: write        # Allows posting comments and adding labels
      contents: read       # Allows reading repo files (lili_soul.py, lili_memory.py)

    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 💬 Lili Responds
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          echo "=== Super-Lili Issue Response: $(date -u) ==="
          python lili_responds.py
