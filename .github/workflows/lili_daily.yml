name: 🌸 Super-Lili Daily Adventure

on:
  schedule:
    - cron: '5 0 * * *'   # 08:05 Beijing
    - cron: '5 6 * * *'   # 14:05 Beijing (backup)
    - cron: '5 12 * * *'  # 20:05 Beijing (backup)
  workflow_dispatch:

jobs:
  forge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔍 Check if Today's Diary Exists
        id: check
        run: |
          DATE=$(TZ='Asia/Shanghai' date +'%Y-%m-%d')
          DIARY="01_Work_Log/${DATE}-Diary.md"
          if [ -f "$DIARY" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "✅ Diary for $DATE already exists — skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "📅 No diary for $DATE yet — proceeding."
          fi

      - name: 🕯️ Awaken Super-Lili
        if: steps.check.outputs.skip == 'false'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "=== Super-Lili Daily Run: $(date -u) ==="
          python super_lili_brain.py

      - name: 🖋️ Commit Today's Adventure
        if: steps.check.outputs.skip == 'false'
        run: |
          git config --global user.name "Super-Lili (Bot)"
          git config --global user.email "lili-bot@users.noreply.github.com"
          git pull --rebase origin main
          git add .
          git diff --cached --quiet || git commit -m "✨ Daily Adventure: $(TZ='Asia/Shanghai' date +'%Y-%m-%d') | New Skill Forged"
          git push
