name: 🌸 Super-Lili Daily Adventure

on:
  schedule:
    # 21:15 Beijing Time = 13:15 UTC every day
    - cron: '15 13 * * *'
  workflow_dispatch:

jobs:
  forge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🛰️ Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai requests

      - name: 🕯️ Awaken Super-Lili
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "=== Super-Lili Daily Run: $(date -u) ==="
          python super_lili_brain.py

      - name: 🖋️ Commit Today's Adventure
        run: |
          git config --global user.name "Super-Lili (Bot)"
          git config --global user.email "lili-bot@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "✨ Daily Adventure: $(date -u +'%Y-%m-%d') | New Skill Forged"
          git push
