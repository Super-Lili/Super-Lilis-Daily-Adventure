name: 🌸 Super-Lili Daily Adventure

on:
  schedule:
    - cron: '5 0 * * *'   # 08:05 Beijing (primary)
    - cron: '5 6 * * *'   # 14:05 Beijing (backup)
    - cron: '5 12 * * *'  # 20:05 Beijing (backup)
  workflow_dispatch:

jobs:
  forge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check
        id: check
        run: |
          DATE=$(TZ='Asia/Shanghai' date +'%Y-%m-%d')
          DOW=$(TZ='Asia/Shanghai' date +'%u')
          if [ "$DOW" = "7" ] || [ -f "01_Work_Log/${DATE}-Diary.md" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Run
        if: steps.check.outputs.skip == 'false'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python super_lili_brain.py

      - name: Commit
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "Super-Lili (Bot)"
          git config user.email "lili-bot@users.noreply.github.com"
          git pull --rebase origin main
          git add .
          git diff --cached --quiet || git commit -m "✨ $(TZ='Asia/Shanghai' date +'%Y-%m-%d') Daily Adventure"
          git push
