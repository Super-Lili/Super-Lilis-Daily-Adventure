name: Super-Lili Daily Adventure

on:
  schedule:
    # Trigger at 21:15 Beijing Time (13:15 UTC)
    - cron: '15 13 * * *'
  workflow_dispatch: # Allows you to trigger it manually for testing

jobs:
  forge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🛰️ Scouting Repository
        uses: actions/checkout@v4

      - name: 🐍 Equipping Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Loading Alchemy Tools
        run: |
          python -m pip install --upgrade pip
          pip install google-genai

      - name: 🕯️ Awakening Super-Lili
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python super_lili_brain.py

      - name: 🖋️ Recording the Adventure
        run: |
          git config --global user.name "Super-Lili (Bot)"
          git config --global user.email "lili-bot@users.noreply.github.com"
          git add .
          git commit -m "Adventure Log: $(date +'%Y-%m-%d') | New Skill Forged" || echo "Nothing new to report today."
          git push
