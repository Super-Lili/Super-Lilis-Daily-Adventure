
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ambient Cue - Afternoon</title>
        <style>
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background-color: #f0f4f8; /* Soft, calming background */
                color: #334e68;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                margin: 0;
                padding: 20px;
                box-sizing: border-box;
                text-align: center;
            }
            .card {
                background-color: #ffffff;
                border-radius: 12px;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
                padding: 40px 30px;
                max-width: 600px;
                width: 100%;
                border-left: 6px solid #6699ff; /* Subtle accent color */
            }
            h1 {
                font-size: 2.5em;
                margin-bottom: 20px;
                color: #4a6fa5;
            }
            p {
                font-size: 1.2em;
                line-height: 1.6;
                color: #555;
            }
            .timestamp {
                margin-top: 30px;
                font-size: 0.85em;
                color: #777;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>Your Gentle Nudge:</h1>
            <p>Hydrate again</p>
            <div class="timestamp">Generated: 2026-05-25 00:07:03</div>
        </div>
    </body>
    </html>
