<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sun Light Color Clock</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: background-color 4s ease, color 4s ease;
    min-height: 100vh;
  }
  #time {
    font-size: clamp(4rem, 18vw, 13rem);
    font-weight: 200;
    letter-spacing: -0.04em;
    line-height: 1;
    transition: color 4s ease;
    font-variant-numeric: tabular-nums;
  }
  #period {
    margin-top: 2rem;
    font-size: clamp(0.65rem, 2vw, 0.85rem);
    font-weight: 500;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    opacity: 0.45;
    transition: color 4s ease, opacity 0.5s ease;
  }
  #date {
    margin-top: 0.6rem;
    font-size: clamp(0.6rem, 1.5vw, 0.75rem);
    font-weight: 400;
    letter-spacing: 0.18em;
    opacity: 0.28;
    transition: color 4s ease;
  }
</style>
</head>
<body>
<div id="time">00:00</div>
<div id="period">—</div>
<div id="date">—</div>

<script>
const ANCHORS = [{"h": 0.0, "bg": "#0b0c1e", "fg": "#4a4a6a", "label": "deep night"}, {"h": 4.5, "bg": "#1a1040", "fg": "#7070a0", "label": "before dawn"}, {"h": 5.5, "bg": "#6b3a5a", "fg": "#f0c0b0", "label": "first light"}, {"h": 6.5, "bg": "#e07b3a", "fg": "#fff8f0", "label": "sunrise"}, {"h": 8.0, "bg": "#f4c36a", "fg": "#5a3a10", "label": "morning gold"}, {"h": 10.0, "bg": "#fef9e7", "fg": "#4a3a20", "label": "late morning"}, {"h": 12.5, "bg": "#e8f4fd", "fg": "#1a3a5a", "label": "noon"}, {"h": 15.0, "bg": "#fde8c0", "fg": "#5a3a10", "label": "afternoon"}, {"h": 17.0, "bg": "#f0934a", "fg": "#fff0e8", "label": "golden hour"}, {"h": 18.5, "bg": "#c0463a", "fg": "#ffe8e0", "label": "sunset"}, {"h": 20.0, "bg": "#6a3070", "fg": "#f0d0f8", "label": "dusk"}, {"h": 21.5, "bg": "#1e1030", "fg": "#8070a8", "label": "evening"}, {"h": 23.0, "bg": "#0b0c1e", "fg": "#4a4a6a", "label": "night"}, {"h": 24.0, "bg": "#0b0c1e", "fg": "#4a4a6a", "label": "deep night"}];

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

function lerp(a, b, t) {
  return Math.round(a + (b - a) * t);
}

function blendHex(hex1, hex2, t) {
  const [r1,g1,b1] = hexToRgb(hex1);
  const [r2,g2,b2] = hexToRgb(hex2);
  const r = lerp(r1,r2,t).toString(16).padStart(2,'0');
  const g = lerp(g1,g2,t).toString(16).padStart(2,'0');
  const b = lerp(b1,b2,t).toString(16).padStart(2,'0');
  return '#' + r + g + b;
}

function getColors(hourFloat) {
  for (let i = 0; i < ANCHORS.length - 1; i++) {
    const a = ANCHORS[i], b = ANCHORS[i+1];
    if (hourFloat >= a.h && hourFloat < b.h) {
      const t = (hourFloat - a.h) / (b.h - a.h);
      const eased = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
      return {
        bg: blendHex(a.bg, b.bg, eased),
        fg: blendHex(a.fg, b.fg, eased),
        label: t < 0.5 ? a.label : b.label,
      };
    }
  }
  return { bg: ANCHORS[0].bg, fg: ANCHORS[0].fg, label: ANCHORS[0].label };
}

const timeEl   = document.getElementById('time');
const periodEl = document.getElementById('period');
const dateEl   = document.getElementById('date');

const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function tick() {
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();
  const hourFloat = h + m/60 + s/3600;

  const hh = String(h).padStart(2,'0');
  const mm = String(m).padStart(2,'0');
  timeEl.textContent = hh + ':' + mm;

  const colors = getColors(hourFloat);
  document.body.style.backgroundColor = colors.bg;
  document.body.style.color = colors.fg;
  timeEl.style.color = colors.fg;
  periodEl.style.color = colors.fg;
  dateEl.style.color = colors.fg;
  periodEl.textContent = colors.label;

  const day = DAYS[now.getDay()];
  const date = now.getDate();
  const mon = MONTHS[now.getMonth()];
  dateEl.textContent = day + ' · ' + mon + ' ' + date;
}

tick();
setInterval(tick, 10000);
setTimeout(tick, 1000 - new Date().getMilliseconds());
</script>
</body>
</html>
